<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>SCL-Lilith</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.css" rel="stylesheet" />

  <style>
    /* animación dropdown */
    .dropdown {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }
    .dropdown.open {
      max-height: 500px;
    }

    /* botón vino con hover y parpadeo */
    .boton-vino {
      background-color: #8B2E3C;
      color: #ffffff;
      border-radius: 12px;
      animation: parpadeo 1.4s ease-in-out infinite;
      transition: background-color 0.2s ease, transform 0.2s ease;
      transform: scale(1.035);
    }
    .boton-vino:hover {
      background-color: #6E1F2B;
      transform: scale(1.02);
    }
    .boton-vino:active {
      transform: scale(0.98);
    }

    /* botón vino sin parpadeo para menu principal */
    .boton-vino-sin-parpadeo {
      background-color: #6E1F2B;
      color: #ffffff;
      border-radius: 12px;
      transition: background-color 0.2s ease, transform 0.2s ease;
      transform: scale(1.035);
    }
    .boton-vino-sin-parpadeo:hover {
      background-color: #8B2E3C;
      transform: scale(1.02);
    }
    .boton-vino-sin-parpadeo:active {
      transform: scale(0.98);
    }

    .titulo-vino {
      color: #8B2E3C;
      font-family: 'Trajan Pro', serif;
      font-size: 1.4rem;
      text-align: center;
      margin-bottom: 1rem;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    }

    @keyframes parpadeo {
      0%, 100% { opacity: 1; }
      40% { opacity: 0.85; }
      70% { opacity: 0.95; }
    }
  </style>
</head>

<body class="bg-gray-900 text-white">

<!-- ================= BIENVENIDA ================= -->
<section id="bienvenida"
  class="min-h-screen flex flex-col items-center justify-center px-6"
  style="background-image: url('assets/img/vertical fondo.jpeg'); background-size: cover; background-position: 7% center;">

  <h1 class="titulo-vino">Bienvenido al sistema de control<br>contable de la lechería 🐄 🥛</h1>

  <button type="button" onclick="irDirectoAMenu()"
    class="boton-vino text-white focus:ring-4 focus:outline-none focus:ring-green-200 dark:focus:ring-green-800 font-medium text-sm px-4 py-2.5 text-center leading-5">

    <span class="text-sm opacity-70">
      Es sólo otro juego de números, no te pierdas, suerte<br>
      toca para continuar<br>
      <span class="text-2xl">👁️</span>
    </span>
  </button>
</section>

<!-- ================= MENU PRINCIPAL ================= -->
<section id="menuPrincipal" class="hidden min-h-screen flex flex-col items-center justify-center gap-6 px-6" style="background-color: #E8DCC8;">
  <h2 class="text-3xl font-bold mb-6 text-[#8B2E3C]">Menú Principal</h2>

  <button onclick="irAProductos()" class="boton-vino-sin-parpadeo text-white text-xl px-6 py-3 w-full max-w-md">
    🥛 Productos
  </button>

  <button onclick="irALoVendido()" class="boton-vino-sin-parpadeo text-white text-xl px-6 py-3 w-full max-w-md">
    🍞 Lo vendido
  </button>
</section>

<!-- ================= PRODUCTOS ================= -->
<section id="productos" class="hidden min-h-screen px-6 py-8" style="background-color: #E8DCC8;">
  <h2 class="text-3xl font-bold mb-8 text-[#8B2E3C] text-center">Productos</h2>

  <!-- Barra de búsqueda -->
  <div class="flex justify-end mb-6">
    <div class="relative">
      <input type="text" id="busquedaProductos" placeholder="Buscar productos..." class="text-gray-900 pl-10 pr-4 py-2 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-[#8B2E3C] focus:border-transparent">
      <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
        <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
        </svg>
      </div>
    </div>
  </div>

  <div class="grid grid-cols-2 gap-4 max-w-md mx-auto overflow-y-auto" id="gridProductos">
    <button class="boton-vino-sin-parpadeo text-white text-lg px-4 py-3 producto-item">
      Leche ($7.50) L
    </button>
    <button class="boton-vino-sin-parpadeo text-white text-lg px-4 py-3 producto-item">
      Pan Dulce ($7.00)
    </button>
    <button class="boton-vino-sin-parpadeo text-white text-lg px-4 py-3 producto-item">
      Bolillo ($2.50)
    </button>
    <button class="boton-vino-sin-parpadeo text-white text-lg px-4 py-3 producto-item">
      Charola
    </button>
    <button class="boton-vino-sin-parpadeo text-white text-lg px-4 py-3 producto-item">
      Azúcar
    </button>
    <button class="boton-vino-sin-parpadeo text-white text-lg px-4 py-3 producto-item">
      Huevo
    </button>
    <button class="boton-vino-sin-parpadeo text-white text-lg px-4 py-3 producto-item">
      Maizena
    </button>
  </div>

  <button onclick="volverAMenuPrincipal()" class="mt-8 mx-auto block boton-vino-sin-parpadeo text-white text-lg px-6 py-3">
    ← Volver al Menú Principal
  </button>
</section>

<script src="app.js"></script>
</body>
</html>
